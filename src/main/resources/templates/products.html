<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8"/>
    <title>Products</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>

<body class="products-page">

<div th:replace="fragments/header :: header"></div>

<h1>Produkter</h1>

<!-- Loop categories -->
<div th:each="entry : ${products}">

    <!-- Category name -->
    <h2 th:text="${entry.key.name}">Category</h2>

    <table>
        <thead>
        <tr>
            <th></th>
            <th>Namn</th>
            <th>Pris</th>
            <th>Lagersaldo</th>
            <th></th>

            <!-- Admin only -->
            <th sec:authorize="hasRole('ROLE_ADMIN')"></th>
        </tr>
        </thead>

        <tbody>
        <!-- Loop products -->
        <tr th:each="product : ${entry.value}">

            <!-- Image -->
            <td>
                <img th:src="${product.imageUrl}"
                     alt="Product image"
                     width="80"
                     height="80"/>
            </td>

            <!-- Name + SECRET badge -->
            <td>
                <span th:text="${product.name}">Product Name</span>

                <!-- TOP SECRET label -->
                <span class="secret-badge"
                      sec:authorize="hasRole('ROLE_ADMIN')"
                      th:if="${product.adminOnly}">
            TOP SECRET
        </span>
            </td>

            <!-- Price -->
            <td th:text="${product.price.intValue()} + ' kr'">0.00</td>

            <!-- Stock -->
            <td th:text="${product.stock}"
                th:classappend="${product.stock < 5} ? 'low-stock' : ''">
            </td>

            <!-- Description -->
            <td>
                <button type="button" onclick="toggleDescription(this)">
                    Visa beskrivning
                </button>

                <div class="description"
                     th:text="${product.description ?: 'No description available'}">
                </div>
            </td>


            <td>
                <form th:action="@{/cart/add/{id}(id=${product.id})}" method="get" style="display:inline;">
                    <button type="submit" class="product-btn" onclick="localStorage.setItem('showToast', 'true')"> Lägg
                        i kundvagn
                    </button>
                </form>
            </td>


            <!-- Admin actions -->
            <td sec:authorize="hasRole('ROLE_ADMIN')">
                <!--<a th:href="@{'/admin/products/edit/' + ${product.id}}">Edit</a>-->

                <form th:action="@{'/products/' + ${product.id}}" method="post">
                    <input type="hidden" name="_method" value="delete"/>
                    <button type="submit"
                            onclick="return confirm('Delete product?')">
                        Ta bort
                    </button>
                </form>
            </td>

        </tr>
        </tbody>
    </table>

</div>

<!-- JS for toggle -->
<script>
    function toggleDescription(button) {
        const desc = button.nextElementSibling;

        if (desc.style.display === "none" || desc.style.display === "") {
            desc.style.display = "block";
            button.innerText = "Dölj beskrivning";
        } else {
            desc.style.display = "none";
            button.innerText = "Visa beskrivning";
        }
    }
</script>

<div th:replace="fragments/footer :: footer"></div>


<script>
    if (localStorage.getItem('showToast')) {
        const t = document.createElement("div");
        t.innerText = "Tillagd i kundvagn! 🛒";
        Object.assign(t.style, {
            position: "fixed",
            bottom: "20px",
            right: "20px",
            padding: "15px",
            background: "#333",
            color: "#fff",
            borderRadius: "5px",
            zIndex: "1000"
        });
        document.body.appendChild(t);

        localStorage.removeItem('showToast');
        setTimeout(() => t.remove(), 2000); // Försvinner efter 2 sekunder
    }
</script>

</body>
</html>
