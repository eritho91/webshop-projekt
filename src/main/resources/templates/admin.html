<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Create Product</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>

<body class="product-form-page">

<div th:replace="fragments/header :: header"></div>

<div class="container">

    <h1>Create New Product</h1>

    <form th:action="@{/products}" th:object="${product}" method="post">

        <!-- CSRF -->
        <input type="hidden"
               th:name="${_csrf.parameterName}"
               th:value="${_csrf.token}"/>

        <div class="form-group">
            <label>Name</label>
            <input type="text" th:field="*{name}" placeholder="Enter product name"/>
        </div>

        <div class="form-group">
            <label>Price</label>
            <input type="number" step="0.01" th:field="*{price}" placeholder="0.00"/>
        </div>

        <div class="form-group">
            <label>Stock</label>
            <input type="number" th:field="*{stock}" placeholder="0"/>
        </div>

        <div class="form-group">
            <label>Description</label>
            <input type="text" th:field="*{description}" placeholder="Short description"/>
        </div>

        <div class="form-group">
            <label>Image URL</label>
            <input type="text" th:field="*{imageUrl}" placeholder="https://..."/>
        </div>

        <div class="form-group checkbox-group">
            <input type="checkbox" th:field="*{adminOnly}"/>
            <label>Admin Only (Top Secret)</label>
        </div>

        <div class="form-group">
            <label>Category</label>
            <select th:field="*{category.id}">
                <option value="">-- Select Category --</option>
                <option th:each="cat : ${categories}"
                        th:value="${cat.id}"
                        th:text="${cat.name}">
                </option>
            </select>
        </div>

        <div style="margin-top: 100px;">
            <button type="submit">Save Product</button>
        </div>

    </form>

</div>

<div th:replace="fragments/footer :: footer"></div>

</body>
</html>
